# default.yaml

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  train_datasets: ["data/processed/B02", "data/processed/B05", "data/processed/B08", "data/processed/B10", "data/processed/B11", "data/processed/B17"]
  test_datasets: ["data/processed/B01", "data/processed/B03", "data/processed/B04", "data/processed/B08", "data/processed/B10", "data/processed/B12", "data/processed/B17"]
  sampling_rate: 128000
  highpass_freq: 2000
  label_strategy: 'rms' # 3sigma or rms
  window_stride: 1024
  lookback: 4096
  horizon: 1024
  skip_ratio: 0.05
  train_ratio: 0.4

model:
  patch_size: 16  
  patch_stride: 8
  trend_downsample: 64
  cnn_out_channels: 64
  mamba_d_model: 64
  mamba_n_layer: 4 
  mamba_d_state: 16
  mamba_d_conv: 3
  mamba_expand: 3
  bidirectional: false
  decomp_kernel: 25
  auto_scale_baselines: true # Tùy chỉnh để Các model baselines có số lượng parameter gần giống  để model Mamba--Hybrid
  use_decomposition: true
  use_stats: true

training:
  batch_size: 128
  learning_rate: 5e-4
  epochs: 50
  device: "cuda"

logging:
  project_name: "Hybrid_Mamba_CNN_B04"
  use_wandb: false
