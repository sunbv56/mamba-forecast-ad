# small.yaml

data:
  raw_dir: "data/raw/B04"
  processed_dir: "data/processed/B04"
  train_datasets: ["data/processed/B02", "data/processed/B05"]
  test_datasets: ["data/processed/B01", "data/processed/B03", "data/processed/B04"]
  sampling_rate: 128000
  highpass_freq: 2000
  window_stride: 1024
  lookback: 4096
  horizon: 1024
  skip_ratio: 0.05
  train_ratio: 0.5

model:
  patch_size: 64
  patch_stride: 32
  trend_downsample: 4       # Giảm 4 lần tham số trend head
  cnn_out_channels: 32
  mamba_d_model: 32
  mamba_n_layer: 2
  mamba_d_state: 8
  mamba_d_conv: 2
  mamba_expand: 2
  bidirectional: false
  decomp_kernel: 25

training:
  batch_size: 128
  learning_rate: 5e-4
  epochs: 50
  device: "cuda"

logging:
  project_name: "Hybrid_Mamba_CNN_Small"
  use_wandb: false
