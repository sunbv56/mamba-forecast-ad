data:
  raw_dir: data/raw/B04
  processed_dir: data/processed/B04
  train_datasets:
  - data/processed/B02
  - data/processed/B05
  test_datasets:
  - data/processed/B02
  - data/processed/B03
  - data/processed/B04
  - data/processed/B05
  sampling_rate: 128000
  highpass_freq: 2000
  label_strategy: rms
  window_stride: 1024
  lookback: 512
  horizon: 128
  skip_ratio: 0.05
  train_ratio: 0.4
model:
  patch_size: 64
  patch_stride: 32
  trend_downsample: 64
  cnn_out_channels: 64
  mamba_d_model: 64
  mamba_n_layer: 4
  mamba_d_state: 16
  mamba_d_conv: 3
  mamba_expand: 3
  bidirectional: false
  decomp_kernel: 25
  auto_scale_baselines: false
  use_revin: true
  use_decomposition: true
  use_multiscale: true
  use_stats: true
training:
  batch_size: 128
  learning_rate: 5e-4
  epochs: 10
  device: cuda
logging:
  project_name: Mamba_Ablation_Full
  use_wandb: false
