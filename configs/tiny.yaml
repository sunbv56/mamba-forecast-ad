# tiny.yaml

data:
  raw_dir: "data/raw/B04"
  processed_dir: "data/processed/B04"
  train_datasets: ["data/processed/B02", "data/processed/B05"]
  test_datasets: ["data/processed/B01", "data/processed/B03", "data/processed/B04"]
  sampling_rate: 128000
  highpass_freq: 2000
  use_hybrid_labels: false
  window_stride: 1024
  lookback: 4096
  horizon: 1024
  skip_ratio: 0.05
  train_ratio: 0.5

model:
  patch_size: 64
  patch_stride: 32
  trend_downsample: 8       # Giảm 8 lần tham số trend head
  cnn_out_channels: 16
  mamba_d_model: 16
  mamba_n_layer: 1
  mamba_d_state: 4
  mamba_d_conv: 2
  mamba_expand: 2
  bidirectional: false
  decomp_kernel: 25

training:
  batch_size: 128
  learning_rate: 5e-4
  epochs: 50
  device: "cuda"

logging:
  project_name: "Hybrid_Mamba_CNN_Tiny"
  use_wandb: false
